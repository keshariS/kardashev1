<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Energy by Sector — Kardashev Type I Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/sectors.css">
</head>
<body>

  <nav class="site-nav-bar" aria-label="Site navigation">
    <a href="index.html" class="k1-logo">K<span class="k1-one">1</span></a>
    <div class="top-nav-links">
      <a href="index.html"     class="top-nav-link">Overview</a>
      <a href="breakdown.html" class="top-nav-link">Breakdown</a>
      <a href="sectors.html"   class="top-nav-link active">Sectors</a>
    </div>
  </nav>

  <canvas id="stars" aria-hidden="true"></canvas>

  <main>
    <header class="site-header">
      <div class="site-title">ENERGY BY SECTOR</div>
      <div class="site-subtitle">Where does humanity's energy actually go?</div>
    </header>

    <!-- ── Overview bar chart ─────────────────────────────────── -->
    <section class="sc-section">
      <div class="sc-hd">
        <div>
          <h2 class="sc-title">Final Energy Consumption <span class="yr-tag" id="data-year"></span></h2>
          <p class="sc-desc">End-use energy delivered to all sectors · TWh / year</p>
        </div>
        <div class="total-badge">
          <span class="tb-val" id="total-val">–</span>
          <span class="tb-unit">TWh total</span>
        </div>
      </div>
      <div class="sc-card chart-card">
        <div class="bar-area">
          <canvas id="chart-sectors"></canvas>
        </div>
      </div>
    </section>

    <!-- ── Sector cards ───────────────────────────────────────── -->
    <section class="sc-section">
      <div class="sc-hd">
        <div>
          <h2 class="sc-title">Sector Breakdown</h2>
          <p class="sc-desc">Share of global final energy · per capita figures based on ~8 billion people</p>
        </div>
      </div>
      <div class="sector-grid" id="sector-grid"></div>
    </section>

    <!-- ── Data note ──────────────────────────────────────────── -->
    <div class="data-note" id="data-note"></div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="js/stars.js"></script>
  <script src="js/sectors.js"></script>
</body>
</html>
