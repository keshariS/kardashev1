name: Refresh Energy Data

on:
  schedule:
    - cron: '0 6 1 * *'   # 06:00 UTC on the 1st of every month
  workflow_dispatch:        # also triggerable manually from the Actions tab

permissions:
  contents: write           # needed to push the updated JSON back to main

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch latest energy data
        run: python scripts/fetch_data.py --fresh

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Data unchanged — nothing to commit."
          else
            git commit -m "chore: refresh energy data $(date +'%Y-%m')"
            git push
          fi
