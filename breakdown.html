<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Energy Breakdown — Kardashev Type I Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/breakdown.css">
</head>
<body>

  <nav class="site-nav-bar" aria-label="Site navigation">
    <a href="index.html" class="k1-logo">K<span class="k1-one">1</span></a>
    <div class="top-nav-links">
      <a href="index.html"     class="top-nav-link">Overview</a>
      <a href="breakdown.html" class="top-nav-link active">Breakdown</a>
      <a href="sectors.html"   class="top-nav-link">Sectors</a>
    </div>
  </nav>

  <canvas id="stars" aria-hidden="true"></canvas>

  <main>
    <header class="site-header">
      <div class="site-title">ENERGY BREAKDOWN</div>
      <div class="site-subtitle">Global primary energy by source &amp; country</div>
    </header>

    <!-- ── 1. Source mix ──────────────────────────────────────── -->
    <section class="bd-section">
      <div class="bd-hd">
        <div>
          <h2 class="bd-title">Energy by Source <span class="yr-tag" id="source-year"></span></h2>
          <p class="bd-desc">World primary energy consumption · TWh / year</p>
        </div>
      </div>
      <div class="source-grid bd-card">
        <div class="donut-wrap">
          <canvas id="chart-donut"></canvas>
          <div class="donut-center">
            <div class="dc-total" id="dc-total">–</div>
            <div class="dc-unit">TWh / yr</div>
          </div>
        </div>
        <div class="source-list" id="source-list"></div>
      </div>
      <div class="fossil-summary" id="fossil-summary"></div>
    </section>

    <!-- ── 2. Top 10 nations ──────────────────────────────────── -->
    <section class="bd-section">
      <div class="bd-hd">
        <div>
          <h2 class="bd-title">Top 10 Energy Nations <span class="yr-tag" id="top10-year"></span></h2>
          <p class="bd-desc">Countries ranked by primary energy consumption</p>
        </div>
        <div class="map-controls">
          <button class="map-toggle active" data-mode="total">Total</button>
          <button class="map-toggle" data-mode="percapita">Per Capita</button>
        </div>
      </div>
      <div class="top10-list" id="top10-list"></div>
    </section>

    <!-- ── 3. 50-year trend ───────────────────────────────────── -->
    <section class="bd-section">
      <div class="bd-hd">
        <div>
          <h2 class="bd-title">50-Year Energy Trend</h2>
          <p class="bd-desc">Global primary energy mix · 1974 – 2024</p>
        </div>
      </div>
      <div class="bd-card trend-card">
        <div class="trend-area">
          <canvas id="chart-trend"></canvas>
        </div>
      </div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="js/stars.js"></script>
  <script src="js/breakdown.js"></script>
</body>
</html>
